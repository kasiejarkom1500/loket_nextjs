services:
  db:
    profiles: ["localdb"]
    image: mysql:8.4
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: antrian_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_PASSWORD: ""
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_DISPLAY_POLL_FALLBACK: ${NEXT_PUBLIC_DISPLAY_POLL_FALLBACK}
    network_mode: host
    environment:
      PORT: "3400"
      WAIT_FOR_DB: "1"
      PRISMA_DB_PUSH_ON_START: "1"
      PRISMA_SEED_ON_START: "1"
      NEXT_PUBLIC_DISPLAY_POLL_FALLBACK: "0"
      NEXT_PUBLIC_ONLINE_REQUESTS_POLL_MS: "15000"
    env_file:
      - .env
    volumes:
      - ./firebase/serviceAccount.json:/app/firebase/serviceAccount.json:ro

volumes:
  mysql_data:
